name: CI

# Sanity checks for pull requests: build + test. Nothing here publishes a
# release — releases are cut only by the manually-triggered release workflow.

on:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore LceWorldConverter.sln
      - name: Build
        run: dotnet build LceWorldConverter.sln -c Release --no-restore
      - name: Test
        run: dotnet test tests/LceWorldConverter.Tests.csproj -c Release --no-build

name: Release

# Manually-triggered, self-contained release workflow. Cuts a new release off
# of main: computes the next version (auto-bumped from the latest v* tag),
# tags main's HEAD, builds all platforms from that tag, and publishes a
# GitHub Release.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which part of the version to bump (ignored if "version" is set)'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: 'Optional exact version to release, e.g. v2.3.0 (overrides bump)'
        required: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Compute version and tag main
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: "Guard: must run from main"
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow must be run from the 'main' branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history + tags to compute the next version

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          override='${{ github.event.inputs.version }}'
          if [ -n "$override" ]; then
            # Accept the version with or without a leading 'v' (e.g. 2.3.0 or v2.3.0).
            case "$override" in
              v*) ;;
              *) override="v$override" ;;
            esac
            case "$override" in
              v[0-9]*.[0-9]*.[0-9]*) ;;
              *) echo "::error::version override must look like vMAJOR.MINOR.PATCH (got '$override')."; exit 1 ;;
            esac
            version="$override"
          else
            latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
            latest="${latest:-v0.0.0}"
            base="${latest#v}"
            major="${base%%.*}"
            rest="${base#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
            case '${{ github.event.inputs.bump }}' in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            version="v${major}.${minor}.${patch}"
            echo "Latest tag: $latest -> bumped ${{ github.event.inputs.bump }} -> $version"
          fi

          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "::error::Tag $version already exists."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $version"

      - name: Tag main and push
        run: |
          set -euo pipefail
          version='${{ steps.version.outputs.version }}'
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Release $version"
          git push origin "$version"

  macos:
    name: macOS .app bundles
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build .app bundles (arm64 + x64)
        run: bash scripts/build-macos-app.sh --version "$VERSION" --arch both
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: scripts/output/*-app.zip
          if-no-files-found: error

  windows:
    name: Windows GUI + installer + CLI
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build release (GUI, installer, CLI for all runtimes)
        shell: pwsh
        run: ./scripts/build-release.ps1 --version "$env:VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            scripts/output/*.zip
            scripts/output/*.exe
          if-no-files-found: error

  linux:
    name: Linux GUI bundle
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish self-contained Linux GUI
        run: |
          short="${VERSION#v}"
          dotnet publish LceWorldConverter.Gui/LceWorldConverter.Gui.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false \
            -p:Version="$short" -p:InformationalVersion="$VERSION" \
            -o publish/linux-gui
          mkdir -p out
          tar -C publish/linux-gui -czf "out/OpenLCE-Converter-$VERSION-linux-x64-app.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: out/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [prepare, macos, windows, linux]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect artifacts and generate checksums
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.tar.gz' \) \
            -exec cp -f {} dist/ \;
          ( cd dist && sha256sum * > SHA256SUMS.txt )
          echo "Release files:"
          ls -1 dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: dist/*
